services:
  scylla:
    image: scylladb/scylla:latest
    container_name: scylla
    ports:
      - "9042:9042"
    command: ["--smp", "1", "--memory", "750M", "--overprovisioned", "1"]
    healthcheck:
      test: ["CMD-SHELL", "cqlsh -e 'DESC KEYSPACES' 127.0.0.1 9042 >/dev/null 2>&1"]
      interval: 5s
      timeout: 5s
      retries: 30

  scylla_init:
    image: scylladb/scylla:latest
    depends_on: 
      scylla:
        condition: service_healthy
    volumes:
      - ./db/schema.cql:/schema.cql:ro
    entrypoint: ["/bin/bash", "-lc"]
    command: ["cqlsh scylla 9042 -f /schema.cql && echo 'schema applied'"]
    restart: "no"